name: sqlvanta
description: "Sqlvanta is a fast, open-source MySQL client built with Flutter, offering secure connections, a powerful query editor, and an intuitive UI for efficient database management."
publish_to: "none"

version: 1.0.2+3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local Database (connections, history, preferences)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secure password storage (OS keychain / DPAPI)
  flutter_secure_storage: ^9.2.2

  # MySQL Connectivity (pure-Dart; FFI C API is Phase 2)
  mysql_client: ^0.0.27

  # Desktop Window Management
  window_manager: ^0.4.3

  # UI / Theming
  flex_color_scheme: ^8.0.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # SQL Syntax Editor (native Flutter widget, no WebView)
  flutter_code_editor: ^0.3.1
  highlight: ^0.7.0

  # Data Grid (virtual scrolling for large result sets)
  pluto_grid: ^8.1.0

  # Resizable split panels
  split_view: ^3.2.1

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  uuid: ^4.4.2
  intl: ^0.20.2
  bot_toast: ^4.1.3

  # HTTP client (update checker, GitHub Releases API)
  http: ^1.2.0

  # App version / build number from pubspec.yaml at runtime
  package_info_plus: ^8.1.3

  # Open URLs in the default browser
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.12
  drift_dev: ^2.20.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # App icon generator
  flutter_launcher_icons: ^0.14.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - res/logo.png
    - res/logo_head.png

flutter_launcher_icons:
  # Shared source image
  image_path: "res/logo_head.png"

  # Android
  android: true
  min_sdk_android: 21

  # iOS
  ios: true

  # Web (PWA manifest icons)
  web:
    generate: true
    image_path: "res/logo_head.png"
    background_color: "#1565C0"
    theme_color: "#1565C0"

  # Windows (.ico embedded in the exe)
  windows:
    generate: true
    image_path: "res/logo_head.png"
    icon_size: 256

  # macOS (.icns in the app bundle)
  macos:
    generate: true
    image_path: "res/logo_head.png"

  # Linux (.png desktop entry icon)
  linux:
    generate: true
    image_path: "res/logo_head.png"
