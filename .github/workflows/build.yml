name: Build & Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.29.3'   # Pin Flutter version for reproducible builds
  JAVA_VERSION: '17'

# ═══════════════════════════════════════════════════════════════════════════════
# CI — runs on every push and PR
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev libsecret-1-dev libjsoncpp-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib/

      - name: Analyze code
        run: flutter analyze --no-pub

      - name: Run tests
        run: flutter test --coverage || true   # Don't fail if no tests yet

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Desktop builds — only on tags or manual dispatch
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (x64)
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package as ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "sqlvanta-windows-x64-$version.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: sqlvanta-windows-x64
          path: sqlvanta-windows-x64-*.zip

  # ── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (Universal)
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package as ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/macos/Build/Products/Release
          zip -r "../../../../../sqlvanta-macos-${VERSION}.zip" sqlvanta.app

      - uses: actions/upload-artifact@v4
        with:
          name: sqlvanta-macos
          path: sqlvanta-macos-*.zip

  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (x64)
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev libsecret-1-dev libjsoncpp-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package as tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czvf "sqlvanta-linux-x64-${VERSION}.tar.gz" \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: sqlvanta-linux-x64
          path: sqlvanta-linux-x64-*.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # Mobile builds — only on tags or manual dispatch
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Android ──────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Android (APK)
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (fat)
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             "sqlvanta-android-${VERSION}.apk"
          mv build/app/outputs/bundle/release/app-release.aab \
             "sqlvanta-android-${VERSION}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: sqlvanta-android
          path: |
            sqlvanta-android-*.apk
            sqlvanta-android-*.aab

  # ── iOS ──────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍏 iOS (no-codesign)
    needs: analyze
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA directory
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build/ios/iphoneos
          zip -r "../../../sqlvanta-ios-${VERSION}.zip" Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: sqlvanta-ios
          path: sqlvanta-ios-*.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # GitHub Release — only on version tags
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: 📦 Publish GitHub Release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SQLvanta ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/sqlvanta-windows-x64/sqlvanta-windows-x64-*.zip
            dist/sqlvanta-macos/sqlvanta-macos-*.zip
            dist/sqlvanta-linux-x64/sqlvanta-linux-x64-*.tar.gz
            dist/sqlvanta-android/sqlvanta-android-*.apk
            dist/sqlvanta-android/sqlvanta-android-*.aab
            dist/sqlvanta-ios/sqlvanta-ios-*.zip
